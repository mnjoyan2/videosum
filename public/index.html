<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Videosum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181b22;
      --border: #2a2f3a;
      --text: #e8eaef;
      --muted: #8b919d;
      --accent: #3d9cf0;
      --accent-dim: #2563a8;
      --danger: #f07178;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.65rem;
      border-radius: 8px;
      border: 1px dashed var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 0.875rem;
    }
    input[type="number"] {
      width: 8rem;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.875rem;
    }
    button {
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.65rem 1.35rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      color: #fff;
      box-shadow: 0 2px 12px rgba(61, 156, 240, 0.25);
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .error {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .meta span strong { color: var(--text); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    .transcript-list {
      max-height: 520px;
      overflow-y: auto;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .transcript-list li {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .transcript-list li:last-child { border-bottom: none; }
    .ts {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .summary-body {
      font-size: 0.95rem;
      white-space: pre-wrap;
      margin-bottom: 1.25rem;
    }
    .clips {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .clips li {
      font-size: 0.85rem;
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
    }
    .clips li:first-child { border-top: none; padding-top: 0; }
    .clip-range {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }
    a.download {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.download:hover { text-decoration: underline; }
    .loading {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Videosum</h1>
      <p class="sub">Upload a video, get Whisper timestamps and an OpenAI summary plus a highlight cut.</p>
    </header>

    <form class="panel" id="form">
      <div class="row">
        <div style="flex: 1; min-width: 200px;">
          <label for="video">Video file</label>
          <input id="video" name="video" type="file" accept="video/*" required />
        </div>
        <div>
          <label for="targetMinutes">Target minutes</label>
          <input id="targetMinutes" name="targetMinutes" type="number" min="0.5" max="30" step="0.5" value="2" />
        </div>
        <div>
          <button type="submit" id="submit">Summarize</button>
        </div>
      </div>
      <div id="err" class="error hidden"></div>
      <div id="loading" class="loading hidden" style="margin-top: 1rem;">
        <span class="spinner"></span>
        <span>Extracting audio, transcribing, summarizing, rendering… this can take several minutes.</span>
      </div>
    </form>

    <div id="results" class="hidden">
      <div class="meta" id="meta"></div>
      <div class="grid">
        <div class="panel card">
          <h2>Transcript (timestamps)</h2>
          <ul class="transcript-list" id="segments"></ul>
          <h2 style="margin-top: 1.25rem;">Full text</h2>
          <div class="summary-body" id="fullText" style="max-height: 200px; overflow-y: auto; font-size: 0.875rem; color: var(--muted);"></div>
        </div>
        <div class="panel card">
          <h2>OpenAI summary</h2>
          <div class="summary-body" id="summaryText"></div>
          <h2 style="margin-top: 1.5rem;">Selected clips</h2>
          <ul class="clips" id="clips"></ul>
          <a class="download" id="download" href="#" download>Download summary video</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    function formatSeconds(totalSeconds) {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const sec = totalSeconds % 60;
      const seconds = String(sec.toFixed(2)).padStart(5, "0");
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${seconds}`;
    }

    const form = document.getElementById("form");
    const submit = document.getElementById("submit");
    const err = document.getElementById("err");
    const loading = document.getElementById("loading");
    const results = document.getElementById("results");
    const meta = document.getElementById("meta");
    const segmentsEl = document.getElementById("segments");
    const fullTextEl = document.getElementById("fullText");
    const summaryText = document.getElementById("summaryText");
    const clipsEl = document.getElementById("clips");
    const download = document.getElementById("download");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.add("hidden");
      err.textContent = "";
      results.classList.add("hidden");
      loading.classList.remove("hidden");
      submit.disabled = true;

      const fd = new FormData(form);
      const videoInput = document.getElementById("video");
      if (!videoInput.files.length) {
        err.textContent = "Choose a video file.";
        err.classList.remove("hidden");
        loading.classList.add("hidden");
        submit.disabled = false;
        return;
      }

      try {
        const res = await fetch("/api/summarize", {
          method: "POST",
          body: fd
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || res.statusText || "Request failed");
        }

        meta.innerHTML = [
          data.language ? `<span>Language: <strong>${escapeHtml(data.language)}</strong></span>` : "",
          data.duration != null
            ? `<span>Duration: <strong>${formatSeconds(Number(data.duration))}</strong></span>`
            : "",
          data.fullText
            ? `<span>Full text length: <strong>${data.fullText.length}</strong> chars</span>`
            : ""
        ].filter(Boolean).join("");

        segmentsEl.innerHTML = (data.segments || [])
          .map(
            (s) => `<li>
              <div class="ts">#${s.index} · ${formatSeconds(s.start)} → ${formatSeconds(s.end)}</div>
              <div>${escapeHtml(s.text)}</div>
            </li>`
          )
          .join("");

        fullTextEl.textContent = data.fullText || "(no plain text in response)";
        summaryText.textContent = data.summary || "";

        clipsEl.innerHTML = (data.clips || [])
          .map(
            (c) => `<li>
              <div class="clip-range">seg ${c.start_segment}–${c.end_segment}</div>
              <div>${escapeHtml(c.reason || "")}</div>
            </li>`
          )
          .join("");

        download.href = data.videoUrl;
        download.setAttribute("download", "summary-video.mp4");

        results.classList.remove("hidden");
      } catch (x) {
        err.textContent = x.message || String(x);
        err.classList.remove("hidden");
      } finally {
        loading.classList.add("hidden");
        submit.disabled = false;
      }
    });

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
